version: '3.8'

services:
  cibi-api:
    image: ufleck/cibi:latest
    build: .
    container_name: cibi-api
    ports:
      - "42069:42069"
    volumes:
      - ./data:/data
    environment:
      CIBI_DATABASEPATH: /data/cibi.db
      CIBI_SERVERPORT: :42069
      CIBI_SAFETYBUFFER: 1000
    restart: unless-stopped
    develop:
      watch:
        - action: rebuild
          path: ./cmd
        - action: rebuild
          path: ./internal
        - action: rebuild
          path: ./web/src
        - action: rebuild
          path: ./go.mod
        - action: rebuild
          path: ./go.sum
        - action: rebuild
          path: ./web/package.json
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:42069/"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

  cibi-cli-install:
    build: .
    container_name: cibi-cli-install
    volumes:
      - /usr/local/bin:/install
    entrypoint: ["/bin/sh", "-c", "cp /app/cibi /install/cibi && chmod +x /install/cibi && echo 'cibi CLI installed to /usr/local/bin'"]
    restart: "no"
